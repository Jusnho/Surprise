    <canvas id="canvas2"></canvas>

<!--Todo Oscuro-->
<audio id="soplido" src="musica.mp3" preload="auto"></audio>
<div class="overlay"></div>

<script>
const audio = document.getElementById("soplido");
audio.volume = 0;

document.addEventListener("click", function iniciarAudio() {
    audio.play().catch(error => console.log("Autoplay bloqueado:", error));

    let volumen = 0;
    const fade = setInterval(() => {
        if (volumen < 0.15) {
            volumen += 0.02;
            audio.volume = volumen;
        } else {
            clearInterval(fade);
        }
    }, 150);

    document.removeEventListener("click", iniciarAudio);
});
</script>

    <script src="Confeti.js"></script>
